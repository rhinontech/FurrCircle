<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; padding: 0; background: #f4f4f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: #FF6B35; padding: 28px 32px; text-align: center; }
    .header img { height: 40px; }
    .header h1 { color: #ffffff; font-size: 22px; margin: 12px 0 0; font-weight: 700; }
    .body { padding: 32px; color: #333333; font-size: 15px; line-height: 1.6; }
    .body p { margin: 0 0 16px; }
    .btn { display: inline-block; margin: 8px 0 24px; padding: 14px 28px; background: #FF6B35; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .list { padding-left: 20px; margin: 0 0 16px; }
    .list li { margin-bottom: 8px; }
    .footer { background: #f9f9f9; border-top: 1px solid #eeeeee; padding: 20px 32px; text-align: center; font-size: 13px; color: #888888; }
    .footer a { color: #FF6B35; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>🐾 FurrCircle</h1>
    </div>
    {{BODY}}
    <div class="footer">
      <p>Need help? Reach us at <a href="mailto:support@furrcircle.com">support@furrcircle.com</a></p>
      <p>© 2025 FurrCircle. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
